name: CI/CD Pipeline - Model Advisory

on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_FRONTEND: 891377324590.dkr.ecr.ap-south-1.amazonaws.com/model-advisory-frontend
      ECR_BACKEND: 891377324590.dkr.ecr.ap-south-1.amazonaws.com/model-advisor-backend

    steps:
      - uses: actions/checkout@v3

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Docker Images
        run: |
          docker build -t frontend:latest ./frontend
          docker build -t backend:latest ./backend

      - name: Tag Docker Images
        run: |
          docker tag frontend:latest $ECR_FRONTEND:v1
          docker tag backend:latest $ECR_BACKEND:v1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 891377324590.dkr.ecr.ap-south-1.amazonaws.com

      - name: Push Docker Images
        run: |
          docker push $ECR_FRONTEND:v1
          docker push $ECR_BACKEND:v1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            export GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            export HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}
            export LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
            export LANGCHAIN_PROJECT=${{ secrets.LANGCHAIN_PROJECT }}
            export LANGCHAIN_ENDPOINT=${{ secrets.LANGCHAIN_ENDPOINT }}
            export LANGCHAIN_TRACING_V2=true
            chmod +x ~/deploy.sh
            ~/deploy.sh